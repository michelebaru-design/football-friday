*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

/* ─── ALTEZZA SCHERMO AFFIDABILE ───
   100dvh = dynamic viewport height: funziona su Chrome/Safari moderni.
   Fallback a 100vh per browser vecchi.
   -webkit-fill-available: fix specifico per iOS Safari. */
html{height:100%;height:-webkit-fill-available}
body{
  min-height:100vh;
  min-height:-webkit-fill-available;
  min-height:100dvh;
  overflow:hidden;
  background:#030712;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif
}

button,input,select,textarea{font-family:inherit;cursor:pointer}
input[type=range]{accent-color:#16a34a;width:100%}

#app{
  display:flex;
  height:100vh;
  height:100dvh; /* usa l'altezza reale escludendo la chrome del browser */
}

#sidebar{
  width:200px;background:#052e16;border-right:1px solid #14532d;
  padding:1.5rem 0;display:none;flex-direction:column;flex-shrink:0
}
.sb-btn{display:flex;align-items:center;gap:10px;padding:10px 16px;margin:0 8px 2px;border-radius:8px;border:none;background:transparent;color:#86efac;font-size:14px;font-weight:400;text-align:left;width:calc(100% - 16px)}
.sb-btn.act{background:#16a34a;color:#fff;font-weight:700}

#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
#mhead{background:#052e16;border-bottom:1px solid #14532d;padding:10px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0}

/* ─── CONTENUTO — padding-bottom per non finire sotto la nav fissa ─── */
#content{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:1rem;
  /* spazio per nav fissa: ~70px nav + safe area */
  padding-bottom:calc(80px + env(safe-area-inset-bottom));
}

/* ─── NAV INFERIORE — POSITION FIXED ───────────────────────────────
   Questa è la soluzione più robusta cross-device:
   • fixed + bottom:0 → sempre visibile indipendentemente dall'altezza
   • env(safe-area-inset-bottom) → spazio per home indicator iPhone X+
     e gesture bar Android (funziona su Chrome Android dal 2020)
   • left/right con safe-area inset → iPhone con notch laterale (landscape)
   • z-index alto → mai coperta da altri elementi
   • flex con flex:1 su ogni .nb → distribuzione uniforme, niente scroll
   ─────────────────────────────────────────────────────────────────── */
#mnav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  /* padding bottom = spazio home indicator / gesture bar */
  padding-bottom:env(safe-area-inset-bottom);
  /* padding laterale per iPhone landscape notch */
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
  background:#052e16;
  border-top:2px solid #14532d;
  display:flex;
  z-index:100;
  /* ombra verso l'alto per dare profondità */
  box-shadow:0 -2px 12px rgba(0,0,0,.5);
}

/* Ogni bottone occupa uguale spazio orizzontale */
.nb{
  flex:1;
  min-width:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:3px;
  background:none;
  border:none;
  padding:8px 4px;
  font-size:10px;
  font-weight:600;
  color:#6b7280;
  letter-spacing:.3px;
  /* evita che il testo vada a capo */
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  /* area di tocco generosa */
  min-height:52px;
}
.nb.act{color:#4ade80}
/* Indicatore attivo sotto l'icona */
.nb.act::before{
  content:'';
  display:block;
  width:24px;height:3px;
  background:#4ade80;
  border-radius:99px;
  position:absolute;
  top:0;
  left:50%;
  transform:translateX(-50%);
}
.nb{position:relative}
.nb-i{font-size:24px;line-height:1}

@media(min-width:768px){
  #sidebar{display:flex!important}
  #mhead,#mnav{display:none!important}
  #content{padding-bottom:1rem!important}
}

/* ═══════════════════════════════════════
   ☁️ CLOUD — Firebase Realtime Database
   • Letture: pubbliche (regole .read:true)
   • Scritture: autenticate con il segreto DB
   • CORS garantito su tutti i browser/dispositivi
═══════════════════════════════════════ */
let FB_URL = localStorage.getItem('ff_fb_url')||'';
let FB_SEC = localStorage.getItem('ff_fb_sec')||'';
const FB_PATH='/ff.json';

/* Auto-collegamento da link condiviso (?db=URL) */
(()=>{
  const p=new URLSearchParams(location.search).get('db');
  if(p){const u=decodeURIComponent(p);if(u!==FB_URL){FB_URL=u;localStorage.setItem('ff_fb_url',u);}}
})();

async function npRead(){
  if(!FB_URL)return null;
  try{
    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),5000);
    const r=await fetch(`${FB_URL}${FB_PATH}?_=${Date.now()}`,{cache:'no-store',signal:ctrl.signal});
    clearTimeout(timer);
    if(!r.ok){S._npErr=`HTTP ${r.status}`;return null;}
    const d=await r.json();S._npErr=null;
    return (d&&Array.isArray(d.players)&&d.players.length>0)?d:null;
  }catch(e){S._npErr=e.message;return null;}
}

async function npWrite(data){
  if(!FB_URL||!FB_SEC)return;
  try{
    await fetch(`${FB_URL}${FB_PATH}?auth=${FB_SEC}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(data)
    });
  }catch(e){}
}

  try{
    const r=await fetch(`${url}${FB_PATH}?auth=${sec}`,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({players:S.players,matches:S.matches,current:S.match||null})
    });

    FB_URL=url;FB_SEC=sec;

    localStorage.setItem('ff_fb_sec',FB_SEC);
    const shareUrl=`${location.origin}${location.pathname}?db=${encodeURIComponent(FB_URL)}`;
    localStorage.setItem('ff_shareurl',shareUrl);
    render();
    setTimeout(()=>alert(
      '✅ Cloud attivato!\n\n'+
      '📤 LINK DA MANDARE AL GRUPPO:\n\n'+shareUrl+'\n\n'+
      'I membri aprono questo link una volta sola e si connettono automaticamente.'
    ),100);
  }catch(e){
    if(btn){btn.innerHTML='❌ Errore';btn.disabled=false;}
    alert('Errore: '+e.message);
  }
}

/* Aggiornamento cloud in BACKGROUND — chiamato dopo render() */
async function cloudRefresh(){
  if(!FB_URL)return;
  if(S.captainMode&&FB_SEC)return;
  const cloud=await npRead();
  if(cloud&&cloud.players&&cloud.players.length>0){
    S.players=cloud.players;S.matches=cloud.matches||[];S.match=cloud.current||null;
    if(cloud.seasons)S.seasons=cloud.seasons;
    if(cloud.seasonName)S.seasonName=cloud.seasonName;
    localStorage.setItem('ff_pl',JSON.stringify(S.players));
    localStorage.setItem('ff_ms',JSON.stringify(S.matches));
    localStorage.setItem('ff_seasons',JSON.stringify(S.seasons));
    localStorage.setItem('ff_season_name',S.seasonName);
    S.match?localStorage.setItem('ff_cm',JSON.stringify(S.match)):localStorage.removeItem('ff_cm');
    S.lastSync=new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    render();

async function ai(msg,sys){
  const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+GROQ_KEY},
    body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:1500,
      messages:[...(sys?[{role:'system',content:sys}]:[]),{role:'user',content:msg}]})});
  const d=await r.json();if(d.error)throw new Error(d.error.message);
  return d.choices?.[0]?.message?.content||'';
}

function calcMediaP(p){return p.G>0?+((p.V*3+p.P)/p.G).toFixed(3):0;}

/* Restituisce data odierna in formato YYYY-MM-DD basata sul fuso LOCALE
   (toISOString darebbe la data UTC: di notte in Italia mostrerebbe ieri) */
function todayLocal(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function matchScorers(m){
  if(!m||!m.ratings)return[];
  return Object.entries(m.ratings)
    .filter(([,r])=>(r.goals||0)>0)
    .sort((a,b)=>b[1].goals-a[1].goals)
    .map(([id,r])=>{
      const p=S.players.find(x=>x.id===id);
      if(!p)return null;
      const team=m.teamA?.includes(id)?'⚪':'⚫';
      return `${team} ${p.name}${r.goals>1?` ×${r.goals}`:''}`;
    }).filter(Boolean);
}

/* Membro segna la propria presenza — scrive sul cloud anche senza essere capitano */
async function selfAttend(status){
  if(!S.match||S.match.phase!=='attendance'||!S.myPlayerId)return;
  S.match.players[S.myPlayerId]=status;
  localStorage.setItem('ff_cm',JSON.stringify(S.match));
  /* Scrivi su cloud (funziona in Firebase test mode o con regole pubbliche) */
  await npWritePublic({players:S.players,matches:S.matches,current:S.match,
    seasons:S.seasons,seasonName:S.seasonName});
  render();
}

/* ─── WHATSAPP SHARE ────────────────────────────────────────── */

function shareWhatsApp(){
  if(!S.match||!S.match.teamA?.length)return;
  const tA=S.players.filter(p=>S.match.teamA.includes(p.id));
  const tB=S.players.filter(p=>S.match.teamB.includes(p.id));
  const fmA=formLabel(tA),fmB=formLabel(tB);
  const link=localStorage.getItem('ff_shareurl')||location.href;
  const gruppoA=ROLES.map(r=>{const ps=tA.filter(p=>p.role===r);return ps.length?`${RICON[r]} ${ps.map(p=>p.name).join(', ')}`:null;}).filter(Boolean).join('\n');
  const gruppoB=ROLES.map(r=>{const ps=tB.filter(p=>p.role===r);return ps.length?`${RICON[r]} ${ps.map(p=>p.name).join(', ')}`:null;}).filter(Boolean).join('\n');
  const msg=
    `⚽ *FOOTBALL FRIDAY — ${S.match.date}*\n\n`+
    `⚪ *BIANCHI* [${fmA}]\n${gruppoA}\n\n`+
    `⚫ *NERI* [${fmB}]\n${gruppoB}\n\n`+
    `📺 Vedi il campo: ${link}`;
  if(navigator.share){
    navigator.share({text:msg}).catch(()=>copyToClipboard(msg));
  }else{
    copyToClipboard(msg);
  }
}

function copyToClipboard(text){
  navigator.clipboard?.writeText(text)
    .then(()=>alert('✅ Messaggio copiato! Incollalo su WhatsApp.'))
    .catch(()=>{
      /* fallback per Safari */
      const ta=document.createElement('textarea');
      ta.value=text;document.body.appendChild(ta);ta.select();
      document.execCommand('copy');document.body.removeChild(ta);
      alert('✅ Messaggio copiato! Incollalo su WhatsApp.');
    });
}

/* ─── STAGIONI ──────────────────────────────────────────────── */

function startNewSeason(){
  const name=prompt('Nome da dare alla stagione che si chiude (es. 2024-25):',S.seasonName)||S.seasonName;
  if(!confirm(`Archiviare la stagione "${name}" e iniziarne una nuova?\n\nLe statistiche attuali vengono conservate nell'archivio.`))return;
  /* Archivia stagione corrente */
  S.seasons.unshift({
    name,
    date:new Date().toLocaleDateString('it-IT'),
    matches:[...S.matches],
    players:S.players.map(p=>({...p})),
    totalGoals:S.players.reduce((s,p)=>s+p.GF,0),
    topScorer:[...S.players].sort((a,b)=>b.GF-a.GF)[0]?.name||'',
    topWins:[...S.players].sort((a,b)=>b.V-a.V)[0]?.name||'',
    topPresenze:[...S.players].sort((a,b)=>b.G-a.G)[0]?.name||'',
  });
  /* Reset statistiche per nuova stagione */
  S.players=S.players.map(p=>({...p,G:0,V:0,P:0,S:0,GF:0,GS:0}));
  S.matches=[];S.match=null;
  S.seasonName=new Date().getFullYear().toString();
  localStorage.setItem('ff_seasons',JSON.stringify(S.seasons));
  localStorage.setItem('ff_season_name',S.seasonName);
  savePl();saveMs();saveCm();
  alert(`✅ Stagione "${name}" archiviata! Nuova stagione ${S.seasonName} iniziata.`);
  S.showPinModal=false;render();
}

  </div>`}

async function refreshData(){
  const btn=document.getElementById('btn-refresh');
  if(btn){btn.innerHTML='<span class="spin">⏳</span> Caricamento...';btn.disabled=true;}
  const cloud=await npRead();
  if(cloud&&cloud.players&&cloud.players.length>0){
    S.players=cloud.players;S.matches=cloud.matches||[];S.match=cloud.current||null;
    S.lastSync=new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    localStorage.setItem('ff_pl',JSON.stringify(S.players));
    localStorage.setItem('ff_ms',JSON.stringify(S.matches));
    S.match?localStorage.setItem('ff_cm',JSON.stringify(S.match)):localStorage.removeItem('ff_cm');
    render();
  }else{
    const errMsg=S._npErr?`❌ ${S._npErr}`:'❌ Nessun dato';
    if(btn){btn.innerHTML=errMsg;btn.disabled=false;}
    setTimeout(()=>{if(!S.captainMode&&FB_URL)refreshData();},5000);
  }
}

  if(S.loading==='teams')return;S.loading='teams';document.getElementById('content').innerHTML=pgTeams();

      `REGOLA: teamA ESATTAMENTE ${half} ID, teamB ESATTAMENTE ${n-half} ID. Nessun duplicato.\n`+

      `Rispondi SOLO JSON valido:\n{"teamA":[...${half} id],"teamB":[...${n-half} id],"explanation":"anti-polemica 2-3 frasi"}`,''
    );
    const d=JSON.parse(txt.replace(/```json|```/g,'').trim());

function fixTeams(rawA,rawB,confIds){
  const valid=new Set(confIds);let a=[...new Set(rawA)].filter(x=>valid.has(x));let b=[...new Set(rawB)].filter(x=>valid.has(x));
  const inA=new Set(a);b=b.filter(x=>!inA.has(x));
  confIds.filter(x=>!inA.has(x)&&!b.includes(x)).forEach(x=>a.length<=b.length?a.push(x):b.push(x));
  while(a.length>b.length+1)b.unshift(a.pop());while(b.length>a.length+1)a.unshift(b.pop());return [a,b];
}
function balancedSplit(players){
  const a=[],b=[];ROLES.forEach(role=>{const ps=[...players.filter(p=>p.role===role)].sort((x,y)=>y.level-x.level);ps.forEach((p,i)=>(i%4===0||i%4===3)?a.push(p.id):b.push(p.id));});
  while(a.length>b.length+1)b.unshift(a.pop());while(b.length>a.length+1)a.unshift(b.pop());return [a,b];
}

function formLabel(ps){const c={P:0,D:0,C:0,A:0};ps.forEach(p=>{if(p.role==='Portiere')c.P++;else if(p.role==='Difensore')c.D++;else if(p.role==='Centrocampista')c.C++;else c.A++;});return `${c.P}-${c.D}-${c.C}-${c.A}`;}

function calcPos(players,side){
  const n=players.length;
  const prio={Portiere:0,Difensore:1,Centrocampista:2,Attaccante:3};
  const sorted=[...players].sort((a,b)=>prio[a.role]-prio[b.role]);
  let slots;
  if(n>=8){slots=[[4,50],[17,15],[17,50],[17,85],[30,15],[30,50],[30,85],[40,50]];for(let i=8;i<n;i++)slots.push([23,15+(i-8)*18]);}
  else if(n===7){slots=[[4,50],[17,15],[17,50],[17,85],[30,28],[30,72],[40,50]];}
  else if(n===6){slots=[[4,50],[17,25],[17,75],[30,25],[30,75],[40,50]];}
  else if(n===5){slots=[[4,50],[17,30],[17,70],[30,50],[40,50]];}
  else{slots=sorted.map((_,i)=>[25,(i+1)*100/(n+1)]);}
  return sorted.map((player,i)=>{const[lx,y]=slots[i]||[25,50];return{player,x:side==='left'?lx:100-lx,y};});
}

  const old=S.matches.find(x=>x.id===S.editingMatch.id);
  const newDate=document.getElementById('em-date').value.trim()||old.date;
  const newSA=Math.max(0,+document.getElementById('em-sA').value||0);
  const newSB=Math.max(0,+document.getElementById('em-sB').value||0);
  const newMvp=document.getElementById('em-mvp').value.trim();
  const newChron=document.getElementById('em-chron').value;
  const conf=Object.entries(old.players||{}).filter(([,s])=>s==='confirmed').map(([id])=>id);
  conf.forEach(pid=>{const i=S.players.findIndex(p=>p.id===pid);if(i<0)return;
    const onA=old.teamA?.includes(pid);const myO=onA?old.scoreA||0:old.scoreB||0,oppO=onA?old.scoreB||0:old.scoreA||0;
    const gf=old.ratings?.[pid]?.goals||0,gs=S.players[i].role==='Portiere'?oppO:0;
    S.players[i]={...S.players[i],G:Math.max(0,S.players[i].G-1),
      V:myO>oppO?Math.max(0,S.players[i].V-1):S.players[i].V,P:myO===oppO?Math.max(0,S.players[i].P-1):S.players[i].P,
      S:myO<oppO?Math.max(0,S.players[i].S-1):S.players[i].S,GF:Math.max(0,S.players[i].GF-gf),GS:Math.max(0,S.players[i].GS-gs)};});
  conf.forEach(pid=>{const i=S.players.findIndex(p=>p.id===pid);if(i<0)return;
    const onA=old.teamA?.includes(pid);const myN=onA?newSA:newSB,oppN=onA?newSB:newSA;
    const gf=old.ratings?.[pid]?.goals||0,gs=S.players[i].role==='Portiere'?oppN:0;
    S.players[i]={...S.players[i],G:S.players[i].G+1,V:myN>oppN?S.players[i].V+1:S.players[i].V,
      P:myN===oppN?S.players[i].P+1:S.players[i].P,S:myN<oppN?S.players[i].S+1:S.players[i].S,GF:S.players[i].GF+gf,GS:S.players[i].GS+gs};});

  savePl();saveMs();S.editingMatch=null;render();
}

function openEditScorers(id){
  S.editingScorers={...S.matches.find(x=>x.id===id)};
  render();
}
function closeEditScorers(){S.editingScorers=null;render();}

function saveEditedScorers(){
  const m=S.matches.find(x=>x.id===S.editingScorers.id);
  if(!m)return;
  const conf=Object.entries(m.players||{}).filter(([,s])=>s==='confirmed').map(([id])=>id);
  conf.forEach(pid=>{
    const i=S.players.findIndex(p=>p.id===pid);if(i<0)return;
    const oldGoals=m.ratings?.[pid]?.goals||0;
    const inp=document.getElementById('sg-'+pid);
    const newGoals=inp?Math.max(0,parseInt(inp.value)||0):oldGoals;
    // Aggiorna solo GF del giocatore
    S.players[i]={...S.players[i],GF:Math.max(0,S.players[i].GF-oldGoals+newGoals)};
    // Aggiorna solo goals nel ratings della partita
    if(!m.ratings)m.ratings={};
    if(!m.ratings[pid])m.ratings[pid]={goals:0};
    m.ratings[pid]={...m.ratings[pid],goals:newGoals};
  });
  S.matches=S.matches.map(x=>x.id===m.id?{...m}:x);
  savePl();saveMs();
  S.editingScorers=null;render();
}

/* ═══════════════════════════════════════
   HELPER STREAK — usato da Gloria e Stats
═══════════════════════════════════════ */
function playerMatchResults(playerId){
  return S.matches.reduce((acc,m)=>{
    const conf=Object.entries(m.players||{}).filter(([,s])=>s==='confirmed').map(([id])=>id);
    if(!conf.includes(playerId))return acc;
    const onA=m.teamA?.includes(playerId);
    const myS=onA?(m.scoreA||0):(m.scoreB||0);
    const oppS=onA?(m.scoreB||0):(m.scoreA||0);
    acc.push(myS>oppS?'V':myS===oppS?'P':'S');
    return acc;
  },[]);
}
function currentStreak(results){
  if(!results.length)return{type:null,count:0};
  const type=results[0];let count=0;
  for(const r of results){if(r===type)count++;else break;}
  return{type,count};
}

/* ═══════════════════════════════════════
   🏅 GLORIA / VERGOGNA
═══════════════════════════════════════ */
function pgGloria(){
  if(!S.matches.length)return`<div style="max-width:640px;margin:0 auto;text-align:center;padding:4rem 1rem">
    <div style="font-size:56px;margin-bottom:16px">🏅</div>
    <div style="font-size:18px;font-weight:700;margin-bottom:8px">Nessun record ancora</div>
    <div class="muted">I record appariranno dopo la prima partita salvata</div>
  </div>`;

  const gloria=[],vergogna=[],curiosita=[];

  // Top scorer
  const ts=[...S.players].sort((a,b)=>b.GF-a.GF)[0];
  if(ts?.GF>0)gloria.push({e:'⚽',t:'<b>'+ts.name+'</b> è il capocannoniere con '+ts.GF+' gol stagionali'});

  // Most appearances
  const ta=[...S.players].sort((a,b)=>b.G-a.G)[0];
  if(ta?.G>0)gloria.push({e:'📅',t:'<b>'+ta.name+'</b> è il più presente: '+ta.G+' partite'});

  // Best media punti (min 5 partite)
  const mp=[...S.players].filter(p=>p.G>=5).sort((a,b)=>calcMediaP(b)-calcMediaP(a))[0];
  if(mp)gloria.push({e:'📊',t:'<b>'+mp.name+'</b> ha la miglior media punti: '+calcMediaP(mp).toFixed(3)});

  // MVP più volte
  const mvpCount={};
  S.matches.forEach(m=>{if(m.mvp)mvpCount[m.mvp]=(mvpCount[m.mvp]||0)+1;});
  const topMvp=Object.entries(mvpCount).sort((a,b)=>b[1]-a[1])[0];
  if(topMvp&&topMvp[1]>=2){const p=S.players.find(x=>x.id===topMvp[0]);if(p)gloria.push({e:'⭐',t:'<b>'+p.name+'</b> è stato MVP '+topMvp[1]+' volte questa stagione'});}

  // Record gol in una partita
  let maxGM={player:null,goals:0,date:''};
  S.matches.forEach(m=>{Object.entries(m.ratings||{}).forEach(([pid,r])=>{if((r.goals||0)>maxGM.goals){const p=S.players.find(x=>x.id===pid);if(p)maxGM={player:p,goals:r.goals,date:m.date};}});});
  if(maxGM.goals>=3)gloria.push({e:'💥',t:'<b>'+maxGM.player.name+'</b> record: '+maxGM.goals+' gol in una sola partita ('+maxGM.date+')'});

  // Streak vittorie / sconfitte / pareggi
  S.players.forEach(p=>{
    const res=playerMatchResults(p.id);
    const str=currentStreak(res);
    if(str.type==='V'&&str.count>=3)gloria.push({e:'🔥',t:'<b>'+p.name+'</b> imbattuto: '+str.count+' vittorie consecutive!'});
    if(str.type==='S'&&str.count>=3)vergogna.push({e:'😅',t:'<b>'+p.name+'</b> non ne azzecca una: '+str.count+' sconfitte di fila'});
    if(str.type==='P'&&str.count>=3)vergogna.push({e:'🤝',t:'<b>'+p.name+'</b> non vince mai: '+str.count+' pareggi consecutivi'});
  });

  // Portiere clean sheet streak
  S.players.filter(p=>p.role==='Portiere').forEach(p=>{
    let cs=0;
    for(const m of S.matches){
      const conf=Object.entries(m.players||{}).filter(([,s])=>s==='confirmed').map(([id])=>id);
      if(!conf.includes(p.id))break;
      const onA=m.teamA?.includes(p.id);
      const oppS=onA?(m.scoreB||0):(m.scoreA||0);
      if(oppS===0)cs++;else break;
    }
    if(cs>=2)gloria.push({e:'🧤',t:'<b>'+p.name+'</b> non subisce gol da '+cs+' partite consecutive'});
  });

  // Attaccanti/centrocampisti a secco
  S.players.filter(p=>p.role==='Attaccante'||p.role==='Centrocampista').forEach(p=>{
    let secco=0;
    for(const m of S.matches){
      const conf=Object.entries(m.players||{}).filter(([,s])=>s==='confirmed').map(([id])=>id);
      if(!conf.includes(p.id))continue;
      if((m.ratings?.[p.id]?.goals||0)>0)break;
      secco++;
    }
    if(secco>=5)vergogna.push({e:'🥶',t:'<b>'+p.name+'</b> non segna da '+secco+' partite consecutive'});
  });

  // Partita più pazza
  let crazy={total:0,date:'',sA:0,sB:0};
  S.matches.forEach(m=>{const t=(m.scoreA||0)+(m.scoreB||0);if(t>crazy.total)crazy={total:t,date:m.date,sA:m.scoreA,sB:m.scoreB};});
  if(crazy.total>=6)curiosita.push({e:'🎢',t:'Partita più pazza: '+crazy.sA+'–'+crazy.sB+' con '+crazy.total+' gol totali ('+crazy.date+')'});

  // Vittoria più larga
  let largo={diff:0,date:'',sA:0,sB:0};
  S.matches.forEach(m=>{const d=Math.abs((m.scoreA||0)-(m.scoreB||0));if(d>largo.diff)largo={diff:d,date:m.date,sA:m.scoreA,sB:m.scoreB};});
  if(largo.diff>=4)curiosita.push({e:'🏆',t:'Vittoria più larga: '+largo.sA+'–'+largo.sB+' ('+largo.date+')'});

  // Partita con 0-0
  const pariZero=S.matches.filter(m=>(m.scoreA||0)===0&&(m.scoreB||0)===0);
  if(pariZero.length>0)curiosita.push({e:'💤',t:pariZero.length+' pareggi 0–0 questa stagione'});

  function block(title,color,items){
    if(!items.length)return'';
    return`<div style="margin-bottom:20px">
      <div style="font-family:-apple-system,sans-serif;font-size:13px;font-weight:800;letter-spacing:2px;color:${color};
        border-bottom:3px solid ${color};padding-bottom:6px;margin-bottom:12px;text-transform:uppercase">${title}</div>
      ${items.map(r=>`<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:#111827;
        border-radius:10px;margin-bottom:6px;border-left:3px solid ${color}">
        <span style="font-size:22px;flex-shrink:0">${r.e}</span>
        <span style="font-size:14px;color:#d1d5db;line-height:1.5">${r.t}</span>
      </div>`).join('')}
    </div>`;
  }

  return`<div style="max-width:640px;margin:0 auto">
    <div style="text-align:center;padding:1rem 0 1.2rem">
      <div style="font-size:40px">🏅</div>
      <div style="font-size:20px;font-weight:900;color:#fbbf24">MURO GLORIA & VERGOGNA</div>
      <div style="font-size:11px;color:#6b7280;margin-top:4px">Stagione ${S.seasonName} · ${S.matches.length} partite</div>
    </div>
    ${!gloria.length&&!vergogna.length&&!curiosita.length
      ?'<div class="muted" style="text-align:center;padding:2rem">Servono più partite per generare i record!</div>'
      :block('🔥 Muro della Gloria','#16a34a',gloria)
       +block('😅 Muro della Vergogna','#dc2626',vergogna)
       +block('🎲 Curiosità','#f59e0b',curiosita)
    }
  </div>`;
}

  const RCOL={Portiere:'#60a5fa',Difensore:'#4ade80',Centrocampista:'#fbbf24',Attaccante:'#f87171'};

        <span style="color:#374151;font-size:18px">›</span>
      </div>`).join('');
    }).join('')}
  </div>`;

  if(!p)return list;

  // Profilo giocatore
  const col=RCOL[p.role]||'#9ca3af';
  const res=playerMatchResults(p.id); // newest first

  // Max values per barre proporzionali
  const maxG=Math.max(...S.players.map(x=>x.G),1);
  const maxV=Math.max(...S.players.map(x=>x.V),1);
  const maxGF=Math.max(...S.players.map(x=>x.GF),1);

      </div>
      <div style="background:#1f2937;border-radius:4px;height:10px;overflow:hidden">
        <div style="width:${pct}%;background:${color};height:100%;border-radius:4px;transition:width .3s"></div>
      </div>
    </div>`;
  }

  const ph=playerPhoto(p.name);

  return`<div style="max-width:640px;margin:0 auto">
    <button onclick="S.statsPlayer=null;render()" style="background:none;border:none;color:#6b7280;font-size:13px;cursor:pointer;margin-bottom:12px;padding:0">‹ Tutti i giocatori</button>

    <!-- Header profilo -->
    <div style="background:linear-gradient(135deg,#052e16,#0a3d1a);border:1px solid #14532d;border-radius:16px;padding:16px;margin-bottom:12px;display:flex;gap:14px;align-items:center">
      <div style="position:relative;flex-shrink:0">
        <div style="width:64px;height:64px;border-radius:50%;background:${col}18;border:3px solid ${col};
          display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden">
          <img src="${ph}" style="width:100%;height:100%;object-fit:cover;display:none"
            onload="this.style.display='block';this.previousElementSibling&&(this.previousElementSibling.style.display='none')"
            onerror="this.style.display='none'"/>
          ${RICON[p.role]}
        </div>
      </div>
      <div style="flex:1;min-width:0">
        <div style="font-size:20px;font-weight:900;letter-spacing:1px">${p.name.toUpperCase()}</div>
        <div style="font-size:11px;font-weight:700;color:${col};margin-top:2px">${p.role.toUpperCase()} · Lv.${'★'.repeat(p.level)+'☆'.repeat(5-p.level)}</div>
        ${streakLabel?`<div style="font-size:12px;color:#fbbf24;margin-top:4px">${streakLabel}</div>`:''}
      </div>
      <div style="text-align:center;flex-shrink:0">
        <div style="font-size:28px;font-weight:900;color:#fbbf24">${mp.toFixed(2)}</div>
        <div style="font-size:9px;color:#6b7280;letter-spacing:1px">MEDIA</div>
      </div>
    </div>

    <!-- Barre statistiche -->
    <div class="card">
      <div style="font-size:11px;font-weight:700;color:#9ca3af;letter-spacing:1px;margin-bottom:12px">STAGIONE ${S.seasonName}</div>
      ${bar('📅 Presenze',p.G,maxG,'#60a5fa')}
      ${bar('🏆 Vittorie',p.V,maxV,'#4ade80')}
      ${bar('⚽ Gol',p.GF,maxGF,'#f59e0b')}
      ${p.role==='Portiere'?bar('🧤 Gol Salvati',p.GS,Math.max(...S.players.map(x=>x.GS),1),'#a78bfa'):''}
      ${p.G>=5?bar('📊 Media Punti',+mp.toFixed(3),+maxMP.toFixed(3),'#f87171'):''}
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid #1f2937">
        ${[['G',p.G,'Partite','#60a5fa'],['V',p.V,'Vittorie','#4ade80'],['P',p.P,'Pareggi','#9ca3af'],['S',p.S,'Sconfitte','#f87171']].map(([l,v,n,c])=>`
          <div style="text-align:center;background:#0a0f1a;border-radius:8px;padding:8px 4px">
            <div style="font-size:22px;font-weight:900;color:${c}">${v}</div>
            <div style="font-size:9px;color:#6b7280;letter-spacing:.5px">${n.toUpperCase()}</div>
          </div>`).join('')}
      </div>
    </div>

    <!-- Ultimi 5 risultati -->
    ${last5.length>0?`<div class="card">
      <div style="font-size:11px;font-weight:700;color:#9ca3af;letter-spacing:1px;margin-bottom:10px">ULTIMI ${last5.length} RISULTATI</div>
      <div style="display:flex;gap:8px">
        ${last5.map(r=>{const c=r==='V'?'#16a34a':r==='P'?'#374151':'#dc2626';return`<div style="flex:1;text-align:center;padding:10px 4px;background:${c};border-radius:8px;font-size:16px;font-weight:900">${r}</div>`;}).join('')}
      </div>
    </div>`:''}

    <!-- Gol per partita -->
    ${(() => {
      const gols=S.matches.filter(m=>{
        const conf=Object.entries(m.players||{}).filter(([,s])=>s==='confirmed').map(([id])=>id);
        return conf.includes(p.id)&&(m.ratings?.[p.id]?.goals||0)>0;
      });
      if(!gols.length)return'';
      return`<div class="card">
        <div style="font-size:11px;font-weight:700;color:#9ca3af;letter-spacing:1px;margin-bottom:10px">⚽ PARTITE CON GOL</div>
        ${gols.slice(0,8).map(m=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #1f2937;font-size:13px">
          <span style="color:#9ca3af">${m.date}</span>
          <span style="font-size:11px">${m.scoreA}–${m.scoreB}</span>
          <span style="font-weight:700;color:#f59e0b">⚽ ${'⚽'.repeat(m.ratings[p.id].goals)}</span>
        </div>`).join('')}
      </div>`;
    })()}
  </div>`;
}

   INIT

(async()=>{
  document.getElementById('root').innerHTML=`
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;background:#030712">
      <div style="font-size:60px">⚽</div>
      <div style="font-size:22px;font-weight:800;color:#4ade80">Football Friday</div>
      <div style="color:#6b7280;font-size:13px">Caricamento dati...</div>
    </div>`;
  try{
    load();   /* sincrono — istantaneo */
    render(); /* app visibile subito */
    cloudRefresh(); /* cloud in background, non blocca */
    if(!S.captainMode){
      document.addEventListener('visibilitychange',()=>{if(!document.hidden)refreshData();});
      setInterval(()=>{if(!document.hidden&&!S.captainMode)refreshData();},60000);
    }
  }catch(err){
    document.getElementById('root').innerHTML=`
      <div style="padding:20px;background:#030712;color:white;font-family:monospace;min-height:100vh">
        <div style="color:#f87171;font-size:18px;margin-bottom:12px">⚠️ Errore avvio</div>
        <div style="color:#fbbf24;margin-bottom:8px">${err.message}</div>
        <pre style="color:#9ca3af;font-size:11px;white-space:pre-wrap;overflow:auto">${err.stack||''}</pre>
        <button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#16a34a;border:none;border-radius:8px;color:white;font-size:14px;cursor:pointer">🔄 Ricarica</button>
      </div>`;
  }
})();
</script>
